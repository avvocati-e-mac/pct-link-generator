name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────
  # macOS ARM (Apple Silicon) — macos-latest = macOS 14 su runner M1/M2
  # ─────────────────────────────────────────
  build-mac-arm:
    name: Build macOS ARM (Apple Silicon)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS ARM64
        run: npx electron-builder --mac --arm64 --publish always --config electron-builder.config.cjs
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────
  # macOS Intel (x64) — cross-compilato da macos-latest (ARM)
  # macos-13 non è più disponibile sui runner GitHub
  # ─────────────────────────────────────────
  build-mac-x64:
    name: Build macOS Intel (x64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS x64
        run: npx electron-builder --mac --x64 --publish always --config electron-builder.config.cjs
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────
  # Windows x64
  # ─────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows x64
        run: npx electron-builder --win --x64 --publish always --config electron-builder.config.cjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────
  # Linux x64 (AppImage)
  # ─────────────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Linux x64
        run: npx electron-builder --linux --x64 --publish always --config electron-builder.config.cjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────
  # Aggiunge le note di installazione macOS alla Release
  # Eseguito solo su push di tag, dopo tutti i job di build
  # ─────────────────────────────────────────
  release-notes:
    name: Publish release with download links
    needs: [build-mac-arm, build-mac-x64, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Build release body and publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: avvocati-e-mac/pct-link-generator
        run: |
          VERSION="${TAG#v}"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"

          EXISTING_NOTES=$(gh release view "${TAG}" --repo "${REPO}" --json body --jq '.body // ""')

          printf '%s\n' \
            "## Scarica PCT Link Generator ${TAG}" \
            "" \
            "| Piattaforma | File da scaricare |" \
            "|---|---|" \
            "| 🍎 macOS — Apple Silicon (M1/M2/M3) | [PCT-Link-Generator-${VERSION}-arm64.dmg](${BASE}/PCT-Link-Generator-${VERSION}-arm64.dmg) |" \
            "| 🍎 macOS — Intel (x64) | [PCT-Link-Generator-${VERSION}.dmg](${BASE}/PCT-Link-Generator-${VERSION}.dmg) |" \
            "| 🪟 Windows | [PCT-Link-Generator-Setup-${VERSION}.exe](${BASE}/PCT-Link-Generator-Setup-${VERSION}.exe) |" \
            "| 🐧 Linux | [PCT-Link-Generator-${VERSION}.AppImage](${BASE}/PCT-Link-Generator-${VERSION}.AppImage) |" \
            "" \
            "> **Non sai quale versione macOS scegliere?**" \
            "> Clicca sul menu Apple () → *Informazioni su questo Mac*: se vedi \"Chip Apple M…\" scarica ARM64, altrimenti scarica Intel." \
            "" \
            "---" \
            "" \
            "## Installazione su macOS" \
            "" \
            "L'app non è notarizzata. Prima di avviarla, esegui nel Terminale:" \
            "" \
            '```bash' \
            'sudo xattr -cr /Applications/PCT\ Link\ Generator.app' \
            '```' \
            "" \
            "Questo comando rimuove l'attributo di quarantena imposto da macOS sui file scaricati da internet." \
            "" \
            "> Sostituisci il percorso se hai installato l'app in una cartella diversa da \`/Applications\`." \
            "" \
            "${EXISTING_NOTES}" \
            > /tmp/release-notes.md

          gh release edit "${TAG}" \
            --repo "${REPO}" \
            --notes-file /tmp/release-notes.md \
            --draft=false \
            --prerelease=${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
