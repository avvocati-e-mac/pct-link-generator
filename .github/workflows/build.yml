name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────
  # macOS ARM (Apple Silicon) — macos-latest = macOS 14 su runner M1/M2
  # ─────────────────────────────────────────
  build-mac-arm:
    name: Build macOS ARM (Apple Silicon)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS ARM64
        run: npx electron-builder --mac --arm64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-arm64
          path: dist/*.dmg

  # ─────────────────────────────────────────
  # macOS Intel (x64) — macos-13 = macOS 13 su runner Intel
  # ─────────────────────────────────────────
  build-mac-x64:
    name: Build macOS Intel (x64)
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS x64
        run: npx electron-builder --mac --x64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-x64
          path: dist/*.dmg

  # ─────────────────────────────────────────
  # Windows x64
  # ─────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows x64
        run: npx electron-builder --win --x64 --publish never

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: dist/*.exe

  # ─────────────────────────────────────────
  # Linux x64 (AppImage)
  # ─────────────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Linux x64
        run: npx electron-builder --linux --x64 --publish never

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: dist/*.AppImage

  # ─────────────────────────────────────────
  # Release: aggrega tutti gli artefatti e crea la GitHub Release
  # Eseguito solo su push di tag (non su workflow_dispatch manuale)
  # ─────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-mac-arm, build-mac-x64, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/mac-arm64/*.dmg
            artifacts/mac-x64/*.dmg
            artifacts/windows-x64/*.exe
            artifacts/linux-x64/*.AppImage
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
